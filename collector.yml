name: Disaster Data Collector

on:
  schedule:
    # 10分ごとに実行
    - cron: "*/10 * * * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      # リポジトリ取得
      - name: Checkout
        uses: actions/checkout@v4

      # Python環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 依存インストール
      - name: Install dependencies
        run: |
          pip install pandas requests

      # データ収集実行
      - name: Run collector
        run: |
          python collector.py

      # 変更があればコミット＆Push
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions"

          git add disaster.db

          git diff --cached --quiet || git commit -m "auto: update disaster data"

          git push